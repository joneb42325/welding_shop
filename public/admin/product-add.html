<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Додати товар</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="admin-container">
      <h2>Додати новий товар</h2>

      <form id="product-form" enctype="multipart/form-data">
        <div class="form-group">
          <label>Назва товару</label>
          <input type="text" name="name" required />
        </div>

        <div class="form-group">
          <label>Категорія</label>
          <select name="category_id" id="category-select" required>
            <option value="">Завантаження категорій...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Опис</label>
          <textarea name="description" rows="5"></textarea>
        </div>

        <div class="form-group checkbox-group">
          <label>
            <span>Спеціальна пропозиція (на головну)</span>
            <input type="checkbox" name="is_special" value="1" />
          </label>
        </div>

        <div class="form-group">
          <label>Зображення</label>
          <input type="file" id="image-input" name="image" required />
        </div>

        <div class="form-group">
          <img id="preview" class="hidden" style="max-width: 200px" />
        </div>

        <button type="submit">Зберегти товар</button>
        <a href="products.html"><button type="button">Назад</button></a>
      </form>
    </div>
    <script src="product-add.js"></script>
  </body>
</html>
